name: Build installers

# Builds the desktop installers and, when a GitHub Release is published,
# attaches them to that release. Can also be run manually (workflow_dispatch),
# in which case the installers are available as workflow artifacts only.
on:
  release:
    types: [published]
  workflow_dispatch:

# Needed so the workflow can upload assets to the release.
permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: build a UNIVERSAL DMG (Intel x64 + Apple Silicon arm64) on
          # macos-latest. `dist:mac` first lipo-merges both ffmpeg-static arches
          # into one fat binary (see scripts/make-universal-ffmpeg.js), then runs
          # electron-builder --universal. ffprobe-static already ships both arches.
          - os: macos-latest
            label: macOS (dmg, universal)
            build: npm run dist:mac
            artifacts: dist/*.dmg
            artifact_name: macos-dmg
          # Windows: `dist:win` builds the x64 NSIS installer, fetching the ffmpeg
          # binary via scripts/fetch-ffmpeg.js. 32-bit (ia32) is not built — upstream
          # ffmpeg-static no longer publishes a win32-ia32 binary.
          - os: windows-latest
            label: Windows (x64)
            build: npm run dist:win
            artifacts: dist/*.exe
            artifact_name: windows-installers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installers
        run: ${{ matrix.build }}
        env:
          # No Apple signing certificate on CI — build unsigned instead of
          # letting electron-builder try (and fail) to auto-discover an identity.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Safety net: assert the ffmpeg binary bundled into the .app is a fat
      # (x86_64 + arm64) binary, so the universal DMG actually runs on both archs.
      - name: Verify universal macOS binary
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ff=$(find dist -path '*ffmpeg-static/ffmpeg' -type f | head -1)
          if [ -z "$ff" ]; then echo "::error::bundled ffmpeg not found in dist/"; exit 1; fi
          echo "ffmpeg: $ff"
          lipo -info "$ff"
          lipo -info "$ff" | grep -q 'x86_64 arm64' || { echo "::error::bundled ffmpeg is not universal"; exit 1; }
          app=$(find dist -path '*Contents/MacOS/*' -type f | head -1)
          [ -n "$app" ] && { echo "app binary: $app"; lipo -info "$app" || true; }

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

      - name: Attach installers to the release
        if: github.event_name == 'release'
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" ${{ matrix.artifacts }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
