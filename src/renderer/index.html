<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video Converter</title>
    <!-- Тема применяется до отрисовки, чтобы не мигать тёмным фоном на светлой теме. -->
    <script src="theme.js"></script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="app-header">
        <div class="brand">
          <svg class="brand-icon" viewBox="0 0 48 48" aria-hidden="true">
            <rect x="3" y="9" width="30" height="30" rx="7" fill="url(#g)" />
            <path d="M20 18v12l11-6z" fill="#0f1115" />
            <path d="M36 20l8-5v18l-8-5z" fill="url(#g)" opacity="0.9" />
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="48" y2="48">
                <stop stop-color="#6ea8ff" />
                <stop offset="1" stop-color="#a678ff" />
              </linearGradient>
            </defs>
          </svg>
          <div>
            <h1>Video Converter</h1>
            <p data-i18n="app_subtitle">Конвертер видео для Windows и macOS</p>
          </div>
        </div>

        <div class="header-controls">
          <div class="control">
            <svg class="control-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
              <circle cx="12" cy="12" r="9" />
              <path d="M3 12h18" />
              <path d="M12 3c2.6 2.7 2.6 15.3 0 18M12 3c-2.6 2.7-2.6 15.3 0 18" />
            </svg>
            <select id="langSelect" class="control-select" data-i18n-aria-label="control_language"></select>
          </div>
          <div class="control">
            <svg class="control-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" aria-hidden="true">
              <circle cx="12" cy="12" r="9" />
              <path d="M12 3a9 9 0 010 18z" fill="currentColor" stroke="none" />
            </svg>
            <select id="themeSelect" class="control-select" data-i18n-aria-label="control_theme">
              <option value="system" data-i18n="theme_system">Системная</option>
              <option value="light" data-i18n="theme_light">Светлая</option>
              <option value="dark" data-i18n="theme_dark">Тёмная</option>
            </select>
          </div>
        </div>
      </header>

      <main class="app-main">
        <section
          id="dropzone"
          class="dropzone"
          tabindex="0"
          role="button"
          data-i18n-aria-label="dropzone_aria"
          aria-label="Добавить файлы"
        >
          <svg class="dz-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 3v12m0-12l-4 4m4-4l4 4M5 15v3a2 2 0 002 2h10a2 2 0 002-2v-3"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <p class="dz-title" data-i18n="dropzone_title">Перетащите видео сюда</p>
          <p class="dz-sub" data-i18n="dropzone_sub">или нажмите, чтобы выбрать файлы</p>
        </section>

        <section id="fileList" class="file-list" hidden></section>

        <section class="settings">
          <div class="setting">
            <label for="format" data-i18n="label_format">Формат</label>
            <select id="format"></select>
          </div>
          <div class="setting" data-only="visual">
            <label for="quality" data-i18n="label_quality">Качество</label>
            <select id="quality">
              <option value="high" data-i18n="quality_high">Высокое</option>
              <option value="medium" selected data-i18n="quality_medium">Среднее</option>
              <option value="low" data-i18n="quality_low">Низкое (меньше размер)</option>
            </select>
          </div>
          <div class="setting" data-only="video">
            <label for="resolution" data-i18n="label_resolution">Разрешение</label>
            <select id="resolution">
              <option value="original" selected data-i18n="resolution_original">Как в оригинале</option>
              <option value="2160">2160p (4K)</option>
              <option value="1440">1440p</option>
              <option value="1080">1080p</option>
              <option value="720">720p</option>
              <option value="480">480p</option>
              <option value="360">360p</option>
            </select>
          </div>
          <div class="setting setting-wide">
            <label data-i18n="label_output">Сохранять в</label>
            <div class="output-row">
              <span id="outputDir" class="output-path">Рядом с оригиналом</span>
              <button id="chooseDir" class="btn btn-ghost" type="button" data-i18n="choose_dir">Выбрать…</button>
              <button id="resetDir" class="btn btn-ghost" type="button" hidden data-i18n="reset_dir">Сброс</button>
            </div>
          </div>
        </section>
      </main>

      <footer class="app-footer">
        <div id="status" class="status"></div>
        <div class="footer-actions">
          <button id="clearBtn" class="btn btn-ghost" type="button" hidden data-i18n="clear">Очистить</button>
          <button id="cancelBtn" class="btn btn-danger" type="button" hidden data-i18n="cancel">Отменить</button>
          <button id="convertBtn" class="btn btn-primary" type="button" disabled data-i18n="convert">
            Конвертировать
          </button>
        </div>
      </footer>
    </div>

    <script src="i18n.js"></script>
    <script src="renderer.js"></script>
  </body>
</html>
